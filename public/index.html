<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firoz Shah Cricket Tournament - Odajhar Village</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cricket: { green: '#10B981', dark: '#1F2937', gold: '#F59E0B' }
          }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Poppins', sans-serif; }
    .cricket-gradient { background: linear-gradient(135deg, #10B981 0%, #059669 50%, #047857 100%); }
    .hero-gradient { background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); }
    .gold-gradient { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); }
    .prize-gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .fee-gradient { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
    .card-shadow { box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
    .live-pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .score-animation { animation: slideIn 0.3s ease-out; }
    @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .shimmer { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .trophy-bounce { animation: bounce 2s infinite; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  </style>
</head>
<body class="bg-gray-50">
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <script src="https://unpkg.com/socket.io-client@4.7.2/dist/socket.io.min.js"></script>
  
  <script type="text/babel">
    const { useState, useEffect, createContext, useContext } = React;
    
    const AppContext = createContext();
    
    // === CONFIGURATION ===
    // Change this to your deployed backend URL
    // For local: 'http://localhost:5000/api'
    // For deployed: 'https://your-backend.onrender.com/api'
    const API_URL = 'https://fzcricket-backend.onrender.com/api';
    const CLOUDINARY_CLOUD = 'dujdkhzyk';
    const CLOUDINARY_PRESET = 'ml_default';
    // ======================
    
    function App() {
      const [currentPage, setCurrentPage] = useState('home');
      const [teams, setTeams] = useState([]);
      const [matches, setMatches] = useState([]);
      const [registrationOpen, setRegistrationOpen] = useState(true);
      const [loading, setLoading] = useState(true);
      
      useEffect(() => {
        fetchData();
      }, []);
      
      const fetchData = async () => {
        try {
          const [teamsRes, matchesRes] = await Promise.all([
            axios.get(`${API_URL}/teams`),
            axios.get(`${API_URL}/matches`)
          ]);
          setTeams(teamsRes.data);
          setMatches(matchesRes.data);
          setRegistrationOpen(teamsRes.data.filter(t => t.status === 'approved').length < 8);
          setLoading(false);
        } catch (err) {
          console.error('Error fetching data:', err);
          setTeams([]);
          setMatches([]);
          setRegistrationOpen(true);
          setLoading(false);
        }
      };
      
      return (
        <AppContext.Provider value={{ currentPage, setCurrentPage, teams, matches, registrationOpen, loading, fetchData }}>
          <div className="min-h-screen flex flex-col">
            <Navbar />
            <main className="flex-1">
              {currentPage === 'home' && <Home />}
              {currentPage === 'register' && <Register />}
              {currentPage === 'teams' && <Teams />}
              {currentPage === 'schedule' && <Schedule />}
              {currentPage === 'results' && <Results />}
              {currentPage === 'contact' && <Contact />}
              {currentPage === 'admin' && <Admin />}
            </main>
            <BottomNav />
          </div>
        </AppContext.Provider>
      );
    }
    
    function Navbar() {
      const { setCurrentPage, currentPage } = useContext(AppContext);
      
      return (
        <nav className="cricket-gradient text-white sticky top-0 z-50 shadow-lg">
          <div className="max-w-7xl mx-auto px-4 py-3">
            <div className="flex items-center justify-between">
              <div className="flex items-center space-x-2" onClick={() => setCurrentPage('home')}>
                <span className="text-2xl">🏏</span>
                <span className="font-bold text-lg">FZ Cricket</span>
              </div>
              <div className="hidden md:flex space-x-4">
                <NavLink page="home" current={currentPage} setCurrentPage={setCurrentPage}>Home</NavLink>
                <NavLink page="teams" current={currentPage} setCurrentPage={setCurrentPage}>Teams</NavLink>
                <NavLink page="schedule" current={currentPage} setCurrentPage={setCurrentPage}>Schedule</NavLink>
                <NavLink page="results" current={currentPage} setCurrentPage={setCurrentPage}>Results</NavLink>
                <NavLink page="contact" current={currentPage} setCurrentPage={setCurrentPage}>Contact</NavLink>
              </div>
              <button onClick={() => setCurrentPage('admin')} className="text-sm bg-white/20 px-3 py-1 rounded">Admin</button>
            </div>
          </div>
        </nav>
      );
    }
    
    function NavLink({ page, current, setCurrentPage, children }) {
      return (
        <button 
          onClick={() => setCurrentPage(page)}
          className={`px-3 py-2 rounded-lg font-medium transition ${current === page ? 'bg-white/20' : 'hover:bg-white/10'}`}
        >
          {children}
        </button>
      );
    }
    
    function BottomNav() {
      const { currentPage, setCurrentPage } = useContext(AppContext);
      
      const navItems = [
        { page: 'home', icon: '🏠', label: 'Home' },
        { page: 'register', icon: '📝', label: 'Register' },
        { page: 'teams', icon: '👥', label: 'Teams' },
        { page: 'schedule', icon: '📅', label: 'Schedule' },
        { page: 'results', icon: '🏆', label: 'Results' },
        { page: 'contact', icon: '📞', label: 'Contact' }
      ];
      
      return (
        <div className="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 bottom-nav z-50">
          <div className="flex justify-around py-2">
            {navItems.map(item => (
              <button 
                key={item.page}
                onClick={() => setCurrentPage(item.page)}
                className={`flex flex-col items-center py-1 px-3 ${currentPage === item.page ? 'text-green-600' : 'text-gray-500'}`}
              >
                <span className="text-xl">{item.icon}</span>
                <span className="text-xs">{item.label}</span>
              </button>
            ))}
          </div>
        </div>
      );
    }
    
    function RulesModal({ onClose }) {
      return (
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
          <div className="bg-white rounded-2xl w-full max-w-lg max-h-[80vh] overflow-y-auto">
            <div className="cricket-gradient text-white p-5 rounded-t-2xl flex justify-between items-center">
              <h3 className="text-xl font-bold">🏏 Tournament Rules</h3>
              <button onClick={onClose} className="text-white text-2xl font-bold">✕</button>
            </div>
            <div className="p-5 space-y-3 text-sm text-gray-700">
              <div className="bg-green-50 border-l-4 border-green-500 p-3 rounded"><p className="font-bold text-green-700">1. Teams</p><p>Maximum 8 teams. Each team must have 15 players. Minimum 11 players required to play.</p></div>
              <div className="bg-blue-50 border-l-4 border-blue-500 p-3 rounded"><p className="font-bold text-blue-700">2. Match Format</p><p>Each match will be of 8 overs. Final match will be of 10 overs.</p></div>
              <div className="bg-yellow-50 border-l-4 border-yellow-500 p-3 rounded"><p className="font-bold text-yellow-700">3. Registration</p><p>Entry fee ₹1100 per team. Fee must be paid before the tournament starts (Cash on Arrival).</p></div>
              <div className="bg-purple-50 border-l-4 border-purple-500 p-3 rounded"><p className="font-bold text-purple-700">4. Points System</p><p>Win = 2 points, Loss = 0 points, No Result = 1 point each.</p></div>
              <div className="bg-red-50 border-l-4 border-red-500 p-3 rounded"><p className="font-bold text-red-700">5. Fair Play</p><p>Any misconduct or argument with umpire will result in immediate disqualification.</p></div>
              <div className="bg-orange-50 border-l-4 border-orange-500 p-3 rounded"><p className="font-bold text-orange-700">6. Umpire Decision</p><p>Umpire's decision will be final. No arguments will be entertained.</p></div>
              <div className="bg-teal-50 border-l-4 border-teal-500 p-3 rounded"><p className="font-bold text-teal-700">7. Toss</p><p>Toss will be done before each match. Winning team can choose to bat or bowl.</p></div>
              <div className="bg-indigo-50 border-l-4 border-indigo-500 p-3 rounded"><p className="font-bold text-indigo-700">8. Venue</p><p>Village Odajhar, Post Naseerpur, Tahsil Biswan, Sitapur - 261202</p></div>
            </div>
          </div>
        </div>
      );
    }

    function Home() {
      const { teams, matches, registrationOpen, loading, setCurrentPage } = useContext(AppContext);
      const liveMatch = matches.find(m => m.status === 'in-progress');
      const [showRules, setShowRules] = useState(false);
      const [gallery, setGallery] = useState(JSON.parse(localStorage.getItem('fzGallery') || '[]'));
      
      if (loading) return <Loading />;
      
      return (
        <div className="pb-16">
          {showRules && <RulesModal onClose={() => setShowRules(false)} />}

          {/* Hero Section */}
          <section className="hero-gradient text-white py-12 px-4 relative overflow-hidden">
            <div className="absolute inset-0 opacity-10 text-9xl flex items-center justify-center">🏏</div>
            <div className="max-w-4xl mx-auto text-center relative">
              <div className="inline-block bg-yellow-400 text-gray-900 text-xs font-bold px-4 py-1 rounded-full mb-4 uppercase tracking-wider">🏆 Official Tournament 2026</div>
              <h1 className="text-3xl md:text-5xl font-bold mb-2 text-white">Firoz Shah Cricket Tournament</h1>
              <p className="text-yellow-300 font-semibold text-lg mb-1">📍 Village Odajhar, Post Naseerpur</p>
              <p className="text-gray-300 text-sm mb-1">Tahsil Biswan, Sitapur - 261202</p>
              <p className="text-green-300 font-bold mt-2">🗓️ Tournament Start: 21 April 2026</p>
              <p className="text-gray-300 text-sm mt-1">8 Teams • 15 Players Each • 8 Overs Matches</p>

              <div className="mt-6 flex flex-wrap justify-center gap-3">
                <div className="bg-white/15 backdrop-blur rounded-xl px-5 py-3 border border-white/20">
                  <p className="text-3xl font-bold text-yellow-300">{teams.length}</p>
                  <p className="text-xs text-gray-300">Teams Registered</p>
                </div>
                <div className="bg-white/15 backdrop-blur rounded-xl px-5 py-3 border border-white/20">
                  <p className="text-3xl font-bold text-green-300">{8 - teams.length}</p>
                  <p className="text-xs text-gray-300">Spots Left</p>
                </div>
                <div className="bg-white/15 backdrop-blur rounded-xl px-5 py-3 border border-white/20">
                  <p className="text-3xl font-bold text-blue-300">{matches.filter(m => m.status === 'completed').length}</p>
                  <p className="text-xs text-gray-300">Matches Played</p>
                </div>
              </div>

              <div className="mt-6 flex flex-wrap justify-center gap-3">
                {registrationOpen ? (
                  <button onClick={() => setCurrentPage('register')}
                    className="bg-green-400 hover:bg-green-300 text-gray-900 font-bold py-3 px-8 rounded-full text-lg transition transform hover:scale-105 shadow-lg">
                    Register Your Team 🚀
                  </button>
                ) : (
                  <div className="bg-red-500/30 border border-red-400 rounded-full px-6 py-3">
                    <p className="text-red-300 font-bold">Registration Closed</p>
                  </div>
                )}
                <button onClick={() => setShowRules(true)}
                  className="bg-yellow-400 hover:bg-yellow-300 text-gray-900 font-bold py-3 px-8 rounded-full text-lg transition transform hover:scale-105 shadow-lg">
                  📋 Tournament Rules
                </button>
              </div>
            </div>
          </section>

          {/* Live Match */}
          {liveMatch && (
            <section className="bg-yellow-50 py-6 px-4 border-b-4 border-yellow-400">
              <div className="max-w-4xl mx-auto">
                <div className="flex items-center justify-center space-x-2 mb-4">
                  <span className="w-3 h-3 bg-red-600 rounded-full live-pulse"></span>
                  <span className="font-bold text-red-600">LIVE MATCH</span>
                </div>
                <div className="bg-white rounded-xl p-4 shadow-lg">
                  <div className="flex justify-between items-center text-center">
                    <div className="flex-1"><p className="font-bold text-lg">{liveMatch.team1?.teamName || 'Team 1'}</p><p className="text-2xl font-bold text-green-600">{liveMatch.team1Score?.runs || 0}/{liveMatch.team1Score?.wickets || 0}</p></div>
                    <span className="text-xl font-bold text-gray-400">VS</span>
                    <div className="flex-1"><p className="font-bold text-lg">{liveMatch.team2?.teamName || 'Team 2'}</p><p className="text-2xl font-bold text-green-600">{liveMatch.team2Score?.runs || 0}/{liveMatch.team2Score?.wickets || 0}</p></div>
                  </div>
                </div>
              </div>
            </section>
          )}

          {/* Entry Fee & Prize */}
          <section className="py-8 px-4">
            <div className="max-w-4xl mx-auto">
              <h2 className="text-2xl font-bold text-center mb-6">💰 Entry Fee & Prize Money</h2>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div className="fee-gradient text-white rounded-2xl p-6 text-center shadow-xl transform hover:scale-105 transition">
                  <p className="text-4xl mb-2">🎟️</p>
                  <p className="text-lg font-bold">Entry Fee</p>
                  <p className="text-4xl font-bold mt-2">₹1,100</p>
                  <p className="text-sm mt-2 bg-white/20 rounded-full px-3 py-1">Cash on Arrival</p>
                </div>
                <div className="gold-gradient text-white rounded-2xl p-6 text-center shadow-xl transform hover:scale-105 transition">
                  <p className="text-4xl mb-2 trophy-bounce">🏆</p>
                  <p className="text-lg font-bold">Winner Prize</p>
                  <p className="text-4xl font-bold mt-2">₹7,000</p>
                  <p className="text-sm mt-2 bg-white/20 rounded-full px-3 py-1">1st Place</p>
                </div>
                <div className="prize-gradient text-white rounded-2xl p-6 text-center shadow-xl transform hover:scale-105 transition">
                  <p className="text-4xl mb-2">🥈</p>
                  <p className="text-lg font-bold">Runner-up Prize</p>
                  <p className="text-4xl font-bold mt-2">₹3,000</p>
                  <p className="text-sm mt-2 bg-white/20 rounded-full px-3 py-1">2nd Place</p>
                </div>
              </div>
            </div>
          </section>

          {/* Photo Gallery */}
          <section className="bg-gray-100 py-8 px-4">
            <div className="max-w-6xl mx-auto">
              <h2 className="text-2xl font-bold text-center mb-6">📸 Photo Gallery</h2>
              {gallery.length === 0 ? (
                <div className="text-center py-12 bg-white rounded-xl shadow">
                  <p className="text-5xl mb-3">📷</p>
                  <p className="text-gray-500">No photos yet. Admin can upload photos.</p>
                </div>
              ) : (
                <GallerySlider photos={gallery} />
              )}
            </div>
          </section>

          {/* Registered Teams */}
          <section className="py-8 px-4">
            <div className="max-w-6xl mx-auto">
              <h2 className="text-2xl font-bold text-center mb-6">👥 Registered Teams ({teams.length}/8)</h2>
              {teams.length === 0 ? (
                <p className="text-center text-gray-500">No teams registered yet</p>
              ) : (
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                  {teams.slice(0, 8).map((team, index) => (
                    <TeamCard key={team._id} team={team} index={index} />
                  ))}
                </div>
              )}
            </div>
          </section>

          {/* Upcoming Matches */}
          <section className="bg-gray-100 py-8 px-4">
            <div className="max-w-6xl mx-auto">
              <h2 className="text-2xl font-bold text-center mb-6">📅 Upcoming Matches</h2>
              {matches.filter(m => m.status === 'scheduled').length === 0 ? (
                <p className="text-center text-gray-500">No matches scheduled yet</p>
              ) : (
                <div className="space-y-3">
                  {matches.filter(m => m.status === 'scheduled').slice(0, 5).map((match, index) => (
                    <MatchCard key={match._id} match={match} index={index} />
                  ))}
                </div>
              )}
            </div>
          </section>
        </div>
      );
    }
    
    function TeamCard({ team, index }) {
      const colors = ['bg-green-500', 'bg-blue-500', 'bg-purple-500', 'bg-orange-500', 'bg-pink-500', 'bg-indigo-500', 'bg-teal-500', 'bg-red-500'];
      
      return (
        <div className="bg-white rounded-xl shadow-lg overflow-hidden card-shadow score-animation">
          <div className={`${colors[index % colors.length]} h-2`}></div>
          <div className="p-4">
            <div className="flex items-center space-x-3">
              <div className="w-12 h-12 rounded-full bg-gray-200 flex items-center justify-center text-2xl font-bold text-gray-600">
                {team.teamName.charAt(0)}
              </div>
              <div>
                <h3 className="font-bold text-gray-800">{team.teamName}</h3>
                <p className="text-sm text-gray-500">Capt: {team.captainName}</p>
              </div>
            </div>
            <div className="mt-3 flex justify-between text-sm">
              <span className="text-gray-500">W: {team.wins} | L: {team.losses}</span>
              <span className="font-bold text-green-600">{team.points} pts</span>
            </div>
          </div>
        </div>
      );
    }
    
    function MatchCard({ match, index }) {
      const date = new Date(match.matchDate).toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric', month: 'short' });
      const time = new Date(match.matchDate).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
      
      return (
        <div className="bg-white rounded-xl p-4 shadow-md flex justify-between items-center">
          <div className="flex items-center space-x-3">
            <span className="text-2xl font-bold text-gray-300">#{index + 1}</span>
            <div>
              <p className="font-semibold">{match.team1?.teamName} vs {match.team2?.teamName}</p>
              <p className="text-sm text-gray-500">{match.venue} • {match.overs} overs</p>
            </div>
          </div>
          <div className="text-right">
            <p className="font-bold text-green-600">{date}</p>
            <p className="text-sm text-gray-500">{time}</p>
          </div>
        </div>
      );
    }
    
    function Register() {
      const { setCurrentPage, registrationOpen, teams, fetchData } = useContext(AppContext);
      const [step, setStep] = useState(1);
      const [formData, setFormData] = useState({
        teamName: '', captainName: '', captainPhone: '', city: 'Odajhar'
      });
      const [players, setPlayers] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [success, setSuccess] = useState(false);
      const [currentTeamId, setCurrentTeamId] = useState('');
      
      if (!registrationOpen) {
        return (
          <div className="py-16 px-4 text-center">
            <div className="max-w-md mx-auto bg-white rounded-xl shadow-lg p-8">
              <span className="text-6xl">😔</span>
              <h2 className="text-2xl font-bold mt-4">Registration Closed</h2>
              <p className="text-gray-500 mt-2">All 8 teams have already registered.</p>
              <button onClick={() => setCurrentPage('home')} className="mt-6 cricket-gradient text-white px-6 py-2 rounded-lg">
                Back to Home
              </button>
            </div>
          </div>
        );
      }
      
      const handleTeamSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError('');
        
        try {
          const res = await axios.post(`${API_URL}/teams/register`, {
            ...formData,
            paymentId: 'demo_payment_' + Date.now()
          });
          setCurrentTeamId(res.data.team._id);
          setStep(2);
          
          const playersArray = [];
          for (let i = 0; i < 15; i++) {
            playersArray.push({ name: '', age: 18, jerseyNumber: i + 1, role: 'batsman', phone: '' });
          }
          setPlayers(playersArray);
        } catch (err) {
          setError(err.response?.data?.message || 'Registration failed');
        }
        setLoading(false);
      };
      
      const handlePlayerUpdate = (index, field, value) => {
        const newPlayers = [...players];
        newPlayers[index][field] = value;
        setPlayers(newPlayers);
      };
      
      const handlePlayersSubmit = async () => {
        setLoading(true);
        try {
          const validPlayers = players.filter(p => p.name.trim());
          await axios.post(`${API_URL}/players/bulk-register/${currentTeamId}`, { players: validPlayers });
          await fetchData();
          setSuccess(true);
        } catch (err) {
          setError(err.response?.data?.message || 'Player registration failed');
        }
        setLoading(false);
      };
      
      if (success) {
        return (
          <div className="py-16 px-4 text-center">
            <div className="max-w-md mx-auto bg-white rounded-xl shadow-lg p-8">
              <span className="text-6xl">🎉</span>
              <h2 className="text-2xl font-bold mt-4">Registration Successful!</h2>
              <p className="text-gray-500 mt-2">Your team has been registered with 15 players.</p>
              <button onClick={() => setCurrentPage('home')} className="mt-6 cricket-gradient text-white px-6 py-2 rounded-lg">
                Go to Home
              </button>
            </div>
          </div>
        );
      }
      
      return (
        <div className="py-8 px-4">
          <div className="max-w-2xl mx-auto">
            <div className="flex justify-center mb-8">
              <div className="flex items-center">
                <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold ${step >= 1 ? 'bg-green-500 text-white' : 'bg-gray-200'}`}>1</div>
                <div className={`w-16 h-1 ${step >= 2 ? 'bg-green-500' : 'bg-gray-200'}`}></div>
                <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold ${step >= 2 ? 'bg-green-500 text-white' : 'bg-gray-200'}`}>2</div>
              </div>
            </div>
            
            <div className="bg-white rounded-xl shadow-lg p-6">
              <h2 className="text-2xl font-bold text-center mb-6">
                {step === 1 ? 'Team Registration' : 'Player Registration (15 Players)'}
              </h2>
              
              <p className="text-center text-sm text-gray-500 mb-6">
                Registration Fee: <span className="font-bold text-green-600">₹300 (Cash on Arrival)</span>
              </p>
              
              {error && (
                <div className="bg-red-100 border border-red-400 text-red-700 px-4 py-2 rounded mb-4">
                  {error}
                </div>
              )}
              
              {step === 1 && (

    function Admin() {
      const { setCurrentPage, teams, matches, fetchData } = useContext(AppContext);
      const [password, setPassword] = useState('');
      const [loggedIn, setLoggedIn] = useState(false);
      const [activeTab, setActiveTab] = useState('teams');
      const [scoreModal, setScoreModal] = useState(null);
      const [scoreData, setScoreData] = useState({ t1runs: '', t1wickets: '', t2runs: '', t2wickets: '', winnerId: '' });
      const token = localStorage.getItem('adminToken');

      const handleLogin = async (e) => {
        e.preventDefault();
        try {
          const res = await axios.post(`${API_URL}/auth/admin/login`, { username: 'admin', password });
          if (res.data.token) {
            localStorage.setItem('adminToken', res.data.token);
            setLoggedIn(true);
          }
        } catch (err) {
          alert('Invalid password');
        }
      };

      const handleApprove = async (teamId) => {
        try {
          await axios.put(`${API_URL}/teams/${teamId}`, { status: 'approved' }, { headers: { Authorization: `Bearer ${token}` } });
          await fetchData();
        } catch (err) { alert('Error approving team'); }
      };

      const handleDelete = async (teamId) => {
        if (!window.confirm('Are you sure?')) return;
        try {
          await axios.delete(`${API_URL}/teams/${teamId}`, { headers: { Authorization: `Bearer ${token}` } });
          await fetchData();
        } catch (err) { alert('Error deleting team'); }
      };

      const handleReject = async (teamId) => {
        try {
          await axios.put(`${API_URL}/teams/${teamId}`, { status: 'rejected' }, { headers: { Authorization: `Bearer ${token}` } });
          await fetchData();
        } catch (err) { alert('Error rejecting team'); }
      };

      const handleMatchStatus = async (matchId, status) => {
        try {
          await axios.put(`${API_URL}/matches/${matchId}/status`, { status }, { headers: { Authorization: `Bearer ${token}` } });
          await fetchData();
        } catch (err) { alert('Error updating match'); }
      };

      const handleScoreUpdate = async () => {
        try {
          await axios.put(`${API_URL}/matches/${scoreModal._id}/score`, {
            team1Score: { runs: parseInt(scoreData.t1runs), wickets: parseInt(scoreData.t1wickets) },
            team2Score: { runs: parseInt(scoreData.t2runs), wickets: parseInt(scoreData.t2wickets) }
          }, { headers: { Authorization: `Bearer ${token}` } });
          if (scoreData.winnerId) {
            await axios.put(`${API_URL}/matches/${scoreModal._id}/status`, { status: 'completed', winnerId: scoreData.winnerId }, { headers: { Authorization: `Bearer ${token}` } });
          }
          setScoreModal(null);
          await fetchData();
        } catch (err) { alert('Error updating score'); }
      };

      const handleGenerateSchedule = async () => {
        if (!window.confirm('This will generate matches for all registered teams. Continue?')) return;
        try {
          await axios.post(`${API_URL}/matches/generate-schedule`, {}, { headers: { Authorization: `Bearer ${token}` } });
          await fetchData();
          alert('Schedule generated successfully!');

              <form onSubmit={handleLogin} className="space-y-4">
                <input type="password" placeholder="Admin Password" value={password}
                  onChange={e => setPassword(e.target.value)}
                  className="w-full p-3 border border-gray-300 rounded-lg" />
                <button type="submit" className="w-full cricket-gradient text-white font-bold py-3 rounded-lg">Login</button>
              </form>
              <button onClick={() => setCurrentPage('home')} className="w-full mt-4 text-gray-500">Back to Home</button>
            </div>
          </div>
        );
      }

      return (
        <div className="py-8 px-4">

              <h2 className="text-2xl font-bold">Admin Dashboard</h2>

                          <button onClick={() => { setScoreModal(match); setScoreData({ t1runs: match.team1Score?.runs || '', t1wickets: match.team1Score?.wickets || '', t2runs: match.team2Score?.runs || '', t2wickets: match.team2Score?.wickets || '', winnerId: '' }); }} className="px-3 py-1 bg-green-500 text-white rounded text-sm">Update Score</button>

                      <div className="flex gap-2">
                        <input type="number" placeholder="Runs" value={scoreData.t2runs} onChange={e => setScoreData({...scoreData, t2runs: e.target.value})} className="w-full p-2 border rounded" />
                        <input type="number" placeholder="Wkts" value={scoreData.t2wickets} onChange={e => setScoreData({...scoreData, t2wickets: e.target.value})} className="w-full p-2 border rounded" />
                      </div>
                    </div>
                  </div>
                  <select value={scoreData.winnerId} onChange={e => setScoreData({...scoreData, winnerId: e.target.value})} className="w-full p-2 border rounded mb-4">
                    <option value="">Select Winner (optional)</option>
                    <option value={scoreModal.team1?._id}>{scoreModal.team1?.teamName}</option>
                    <option value={scoreModal.team2?._id}>{scoreModal.team2?.teamName}</option>
                  </select>
                  <div className="flex gap-2">
                    <button onClick={handleScoreUpdate} className="flex-1 cricket-gradient text-white font-bold py-2 rounded-lg">Save</button>
                    <button onClick={() => setScoreModal(null)} className="flex-1 bg-gray-200 py-2 rounded-lg">Cancel</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }
    
    function GallerySlider({ photos }) {
      const [current, setCurrent] = useState(0);

      useEffect(() => {
        const timer = setInterval(() => {
          setCurrent(prev => (prev + 1) % photos.length);
        }, 3000);
        return () => clearInterval(timer);
      }, [photos.length]);

      return (
        <div className="relative rounded-2xl overflow-hidden shadow-xl" style={{height: '320px'}}>
          {photos.map((photo, i) => (
            <div key={i} className={`absolute inset-0 transition-opacity duration-700 ${i === current ? 'opacity-100' : 'opacity-0'}`}>
              <img src={photo.url} alt={photo.caption || 'Gallery'} className="w-full h-full object-cover" />
              {photo.caption && (
                <div className="absolute bottom-0 left-0 right-0 bg-black/50 text-white text-center py-2 px-4">
                  <p className="font-medium">{photo.caption}</p>
                </div>
              )}
            </div>
          ))}
          <button onClick={() => setCurrent(prev => (prev - 1 + photos.length) % photos.length)}
            className="absolute left-3 top-1/2 -translate-y-1/2 bg-black/50 text-white w-10 h-10 rounded-full flex items-center justify-center text-xl hover:bg-black/70">
            ‹
          </button>
          <button onClick={() => setCurrent(prev => (prev + 1) % photos.length)}
            className="absolute right-3 top-1/2 -translate-y-1/2 bg-black/50 text-white w-10 h-10 rounded-full flex items-center justify-center text-xl hover:bg-black/70">
            ›
          </button>
          <div className="absolute bottom-10 left-0 right-0 flex justify-center gap-2">
            {photos.map((_, i) => (
              <button key={i} onClick={() => setCurrent(i)}
                className={`w-2 h-2 rounded-full transition ${i === current ? 'bg-white' : 'bg-white/50'}`} />
            ))}
          </div>
          <div className="absolute top-3 right-3 bg-black/50 text-white text-xs px-2 py-1 rounded-full">
            {current + 1} / {photos.length}
          </div>
        </div>
      );
    }

    function GalleryAdmin() {
      const [gallery, setGallery] = useState(JSON.parse(localStorage.getItem('fzGallery') || '[]'));
      const [uploading, setUploading] = useState(false);
      const [caption, setCaption] = useState('');

      const handleUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setUploading(true);
        try {
          const formData = new FormData();
          formData.append('file', file);
          formData.append('upload_preset', CLOUDINARY_PRESET);
          const res = await axios.post(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, formData);
          const newPhoto = { url: res.data.secure_url, caption };
          const updated = [...gallery, newPhoto];
          setGallery(updated);
          localStorage.setItem('fzGallery', JSON.stringify(updated));
          setCaption('');
          alert('Photo uploaded successfully!');
        } catch (err) {
          alert('Upload failed. Try again.');
        }
        setUploading(false);
      };

      const handleDelete = (index) => {
        if (!window.confirm('Delete this photo?')) return;
        const updated = gallery.filter((_, i) => i !== index);
        setGallery(updated);
        localStorage.setItem('fzGallery', JSON.stringify(updated));
      };

      return (
        <div className="bg-white rounded-xl shadow-lg p-6">
          <h3 className="text-xl font-bold mb-4">📸 Manage Gallery</h3>
          <div className="bg-gray-50 rounded-xl p-4 mb-6">
            <p className="font-medium mb-3">Upload New Photo</p>
            <input type="text" placeholder="Caption (optional)" value={caption}
              onChange={e => setCaption(e.target.value)}
              className="w-full p-2 border rounded mb-3" />
            <label className={`block w-full text-center cricket-gradient text-white font-bold py-3 rounded-lg cursor-pointer ${uploading ? 'opacity-50' : ''}`}>
              {uploading ? 'Uploading...' : '📤 Choose & Upload Photo'}
              <input type="file" accept="image/*" onChange={handleUpload} disabled={uploading} className="hidden" />
            </label>
          </div>
          {gallery.length === 0 ? (
            <p className="text-center text-gray-500">No photos uploaded yet.</p>
          ) : (
            <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
              {gallery.map((photo, i) => (
                <div key={i} className="relative rounded-xl overflow-hidden shadow aspect-square">
                  <img src={photo.url} alt={photo.caption} className="w-full h-full object-cover" />
                  {photo.caption && <p className="absolute bottom-0 left-0 right-0 bg-black/50 text-white text-xs p-1 text-center">{photo.caption}</p>}
                  <button onClick={() => handleDelete(i)} className="absolute top-2 right-2 bg-red-500 text-white rounded-full w-6 h-6 text-xs flex items-center justify-center">✕</button>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function Loading() {
      return (
        <div className="py-20 text-center">
          <div className="inline-block w-12 h-12 border-4 border-green-500 border-t-transparent rounded-full animate-spin"></div>
          <p className="mt-4 text-gray-500">Loading...</p>
        </div>
      );
    }
    
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
